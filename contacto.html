<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
  <div class="container">

    <!-- HEADER -->
    <header>
      <nav class="nav">
        <a href="index.html" class="nav-logo">Aldo Castillo Bernal</a>
        <ul class="nav-links">
          <li><a href="index.html">Inicio</a></li>
          <li><a href="biografia.html">Biografía</a></li>
          <li><a href="portfolio.html">Portfolio</a></li>
          <li><a href="contacto.html" class="active">Contacto</a></li>
        </ul>
      </nav>

      <div class="nav-divider"></div>
    </header>

    <!-- MAIN -->
    <main>

      <!-- Encabezado -->
      <section class="marco">
        <header class="page-header">
          <h1>Contacto</h1>
          <p>Envíame un mensaje para consultas, colaboraciones o proyectos.</p>
        </header>
      </section>

      <!-- Formulario -->
      <section class="marco">
        <form action="#" method="post" class="contact-form">

          <label for="nombre" class="form-label">Nombre</label>
          <input type="text" id="nombre" name="nombre" class="form-input" required />

          <label for="email" class="form-label">Correo electrónico</label>
          <input type="email" id="email" name="email" class="form-input" required />

          <label for="mensaje" class="form-label">Mensaje</label>
          <textarea id="mensaje" name="mensaje" class="form-textarea" rows="6" required></textarea>

          <button type="submit" class="form-button">Enviar mensaje</button>

        </form>
      </section>

    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <p class="footer-left">Aldo Castillo Bernal · Lima / Vitoria‑Gasteiz</p>
      <div class="footer-links">
        <a href="https://www.linkedin.com/in/aldo-castillo-bernal/" target="_blank">LinkedIn</a>
        <a href="https://www.behance.net/alcasber25" target="_blank">Behance</a>
        <a href="contacto.html">Contacto</a>
      </div>
    </footer>

  </div>
</body>
